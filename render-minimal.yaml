services:
  - type: web
    name: smartqueue-ai
    env: php
    plan: free
    runtime: php
    
    # Build ultra-simple
    buildCommand: |
      composer install --no-dev --optimize-autoloader --no-interaction --no-scripts
    
    # Démarrage simple
    startCommand: |
      php artisan serve --host=0.0.0.0 --port=$PORT
    
    # Health check
    healthCheckPath: /health
    healthCheckTimeout: 10
    
    # Variables essentielles seulement
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: smartqueue-db
          property: host
      - key: DB_DATABASE
        fromDatabase:
          name: smartqueue-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: smartqueue-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smartqueue-db
          property: password

databases:
  - name: smartqueue-db
    databaseName: smart_queue_ai
    user: smartqueue_user
    plan: free
